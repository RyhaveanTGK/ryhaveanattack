services:
  - type: web
    name: ryhavean-bot
    env: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false  # Render dashboard-dan əl ilə doldurulacaq
      - key: ADMIN_ID
        sync: false
